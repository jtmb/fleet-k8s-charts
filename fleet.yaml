apiVersion: fleet.cattle.io/v1alpha1
kind: Bundle
metadata:
  name: wordpress-traefik-bundle
  namespace: fleet-local
spec:
  clusterName: fleet-local  # Targeting the fleet-local cluster
  resources:
    - name: traefik
      namespace: traefik
      targetNamespace: traefik
      chart:
        name: traefik
        version: 10.3.0   # Adjust the version as needed
        repo: https://helm.traefik.io/traefik
        valuesFile: ./charts/traefik/values.yaml
    - name: wordpress
      namespace: wordpress
      targetNamespace: wordpress
      chart:
        name: wordpress
        version: 11.0.0  # Adjust the version as needed
        repo: https://charts.bitnami.com/bitnami
        valuesFile: ./charts/wordpress/values.yaml
